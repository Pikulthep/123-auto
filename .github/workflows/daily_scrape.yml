name: Daily Movie Scrape

on:
  schedule:
    # 🌟 รันทุกวันที่ 1 และ 16 ของเดือน (ประมาณทุกๆ 15 วัน)
    - cron: '13 3 1,16 * *'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  run-movie-scraper:
    runs-on: ubuntu-latest
    
    # 🌟 ปรับเป็น 360 นาที (ค่าสูงสุดที่ GitHub ยอมรับ)
    timeout-minutes: 999 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip' 

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create output directory
        run: mkdir -p output

      - name: Run Movie Script (ดึงหนังใหม่ 2026)
        run: python movie_script.py

      - name: Commit and Push results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add output/*
          
          if ! git diff --staged --quiet; then
            git commit -m "Auto-update movies: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          else
            echo "No changes to commit"
          fi
